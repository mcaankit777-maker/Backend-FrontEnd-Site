 <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script>
    async function fetchUsers() {
        try {
            const response = await axios.get('http://127.0.0.1:9898/users');
            const users = response.data;  

            const tableBody = document.querySelector('#userTable tbody');
            tableBody.innerHTML = '';

            users.forEach(user => {
                const row = document.createElement('tr');
                row.innerHTML = `
                     <td style="border: 1px solid blue; padding: 8px;">${user.name}</td>
                     <td style="border: 1px solid blue; padding: 8px;">${user.age}</td>
                     <td style="border: 1px solid blue; padding: 8px;">${user.location}</td>
                     <td style="border: 1px solid blue; padding: 8px;">${user.email}</td>
                    <td style="border: 1px solid blue; padding: 8px;"><button onclick="editUser('${user._id}')">Edit</button></td>
                   <td style="border: 1px solid blue; padding: 8px;"><button onclick="deleteUser('${user._id}')">Delete</button></td>
                `;
                tableBody.appendChild(row);
            });
        } catch (error) {
            console.error('Unable to Fetch Users Data', error);
        }
    }
    async function fetchUsers() {
    try {
        const response = await axios.get('http://127.0.0.1:9898/users');
        const users = response.data;  

        const searchQuery = document.getElementById('searchBar').value.toLowerCase();
        const tableBody = document.querySelector('#userTable tbody');
        tableBody.innerHTML = '';

        users
            .filter(user => 
                user.name.toLowerCase().includes(searchQuery) ||
                user.email.toLowerCase().includes(searchQuery) ||
                user.location.toLowerCase().includes(searchQuery) ||
                String(user.age).includes(searchQuery)
            )
            .forEach(user => {
                const row = document.createElement('tr');
                row.innerHTML = `
                     <td style="border: 1px solid blue; padding: 8px;">${user.name}</td>
                     <td style="border: 1px solid blue; padding: 8px;">${user.age}</td>
                     <td style="border: 1px solid blue; padding: 8px;">${user.location}</td>
                     <td style="border: 1px solid blue; padding: 8px;">${user.email}</td>
                     <td style="border: 1px solid blue; padding: 8px;"><button onclick="editUser('${user._id}')">Edit</button></td>
                     <td style="border: 1px solid blue; padding: 8px;"><button onclick="deleteUser('${user._id}')">Delete</button></td>
                `;
                tableBody.appendChild(row);
            });
    } catch (error) {
        console.error('Unable to Fetch Users Data', error);
    }
}

document.getElementById('searchBar').addEventListener('input', fetchUsers);



    // Submit Form With Axios Post
    document.getElementById('userForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const userData = {
            name: document.getElementById('name').value,
            age: document.getElementById('age').value,
            location: document.getElementById('location').value,
            email: document.getElementById('email').value
        };

        try {
            await axios.post('http://127.0.0.1:9898/users', userData);
            alert('User Created Successfully');
            fetchUsers();  
        } catch (error) {
            console.log('Unable to create user', error);
        }
    });

    // Edit User By Axios

    async function editUser(id) {
    const name = prompt("Enter new name:");
    const age = prompt("Enter new age:");
    const location = prompt("Enter new location:");
    const email = prompt("Enter new email:");

    try {
        await axios.put(`http://127.0.0.1:9898/users/${id}`, {
            name,
            age,
            location,
            email
        });
        alert("User Updated Successfully");
        fetchUsers(); 
    } catch (error) {
        console.error("Unable to update user", error);
    }
}

// Delete User By Axios

async function deleteUser(id) {
    if (confirm("Are you sure you want to delete this user?")) {
        try {
            await axios.delete(`http://127.0.0.1:9898/users/${id}`);
            alert("User Deleted Successfully");
            fetchUsers(); 
        } catch (error) {
            console.error("Unable to delete user", error);
        }
    }
}

let token = null;

// Login
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const loginData = {
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value
    };

    try {
        const response = await axios.post('http://127.0.0.1:9898/login', loginData);
        token = response.data.token;
        localStorage.setItem('authToken', token); // save token in localStorage
        alert('Login Successful');
        fetchProfile();
    } catch (error) {
        console.error('Login Failed', error);
    }
});

// Fetch Profile with Token
async function fetchProfile() {
    try {
        const savedToken = localStorage.getItem('authToken');
        const response = await axios.get('http://127.0.0.1:9898/profile', {
            headers: { Authorization: `Bearer ${savedToken}` }
        });
        const user = response.data;
        document.getElementById('profile').innerHTML = `
            <h3>Welcome, ${user.name}</h3>
            <p>Email: ${user.email}</p>
            <p>Location: ${user.location}</p>
            <p>Age: ${user.age}</p>
        
        `;
    } catch (error) {
        console.error('Unable to fetch profile', error);
    }
}
function getAuthToken() {
    return localStorage.getItem('authToken');
}
